name: AI Tech Debt Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no issue creation)"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  tech_debt_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run AI tech debt collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGENT_ASSIGN_TOKEN: ${{ secrets.AGENT_ASSIGN_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            bundle exec tech-debt-collector --dry-run
          else
            bundle exec tech-debt-collector
          fi
