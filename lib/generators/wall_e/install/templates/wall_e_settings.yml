version: 1

llm:
  provider: "openai"
  model: "gpt-5"
  api_key_env: "OPENAI_API_KEY"
  max_tokens: 16384
  temperature: 0.2
  retry_attempts: 3
  retry_base_delay_seconds: 1.0
  batch_size: 15
  inter_batch_delay_seconds: 2.0

analysis:
  paths:
    - "app/controllers/**/*.rb"
    - "app/models/**/*.rb"
    - "app/services/**/*.rb"
    - "app/queries/**/*.rb"
    - "app/jobs/**/*.rb"
    - "lib/**/*.rb"
  exclude_paths:
    - "vendor/**"
    - "db/migrate/**"
    - "node_modules/**"
  flog_threshold: 25 # methods with a flog score above this are surfaced as high_complexity candidates

github:
  repo: null # defaults to GITHUB_REPOSITORY env var
  labels:
    - name: "tech-debt"
      color: "d93f0b"
  issue_prefix: "[wall-e]"
  max_issues_per_run: 10

auto_assign:
  enabled: true
  agent: "claude" # "copilot" | "cursor" | "opencode" | "claude"
  token_env: "AGENT_ASSIGN_TOKEN" # falls back to GITHUB_TOKEN if not set
  filters:
    min_severity: "medium" # "low" | "medium" | "high"
    debt_types: [] # empty = all debt types

# Optional: PR verification (--verify-pr) can auto-close issues when all checks pass (use with care).
verification:
  close_on_pass: false
