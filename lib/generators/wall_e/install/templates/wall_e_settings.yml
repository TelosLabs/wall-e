version: 1

llm:
  provider: "openai" # "openai" | "anthropic"
  model: "gpt-4.1"
  api_key_env: "OPENAI_API_KEY" # "OPENAI_API_KEY" | "ANTHROPIC_API_KEY"
  max_tokens: 16384
  temperature: 0.2
  retry_attempts: 3
  retry_base_delay_seconds: 1.0
  batch_size: 15
  inter_batch_delay_seconds: 2.0

analysis:
  paths:
    - "app/controllers/**/*.rb"
    - "app/models/**/*.rb"
    - "app/services/**/*.rb"
    - "app/queries/**/*.rb"
    - "app/jobs/**/*.rb"
    - "lib/**/*.rb"
  exclude_paths:
    - "vendor/**"
    - "db/migrate/**"
    - "node_modules/**"
  debt_types:
    fat_controller: # controller-owned orchestration that should live elsewhere
      enabled: true
      threshold_lines: 100
      severity: "high"
    leaked_business_logic: # business rules living outside the domain layer (in controllers, views, helpers, jobs, or rake tasks)
      enabled: true
      severity: "high"
    semantic_duplication: # functionally identical or near-identical logic in two or more locations, even if variable names or structure differ
      enabled: true
      similarity_threshold: 0.85
      severity: "medium"
    dead_code: # methods, classes, or modules that are defined but never called or referenced anywhere in the application
      enabled: true
      severity: "low"
    missing_concern: # shared behavior across multiple models/controllers that should be extracted into a Rails Concern
      enabled: true
      severity: "medium"
    high_complexity: # a method with deeply nested conditionals, excessive branching, or a high cyclomatic/flog complexity score
      enabled: true
      flog_threshold: 25
      severity: "high"

github:
  repo: null # if not set, GITHUB_REPOSITORY is used
  labels:
    - name: "tech-debt"
      color: "d93f0b"
  issue_prefix: "[wall-e]"
  max_issues_per_run: 10

reporting:
  generate_summary: true
  summary_path: "tmp/wall_e_report.json"

auto_assign:
  enabled: true
  agent: "copilot" # "copilot" | "cursor"
  token_env: "AGENT_ASSIGN_TOKEN" # if secret is not set, GITHUB_TOKEN is used
  filters:
    min_severity: "medium" # low, medium, high
    debt_types: [] # Empty for all debt types
  cursor_prompt: |
    Analyze and fix this tech debt issue. Read the description for file path,
    debt type, and suggested refactoring approach. Open a PR when done.
